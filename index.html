<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kadesh Co.</title>

<style>

body{
margin:0;
font-family:'Didot','Times New Roman',serif;
background:white;
color:#111;
text-align:center;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
font-size:48px;
letter-spacing:10px;
}

.tagline{
margin-top:20px;
letter-spacing:6px;
font-size:16px;
text-transform:uppercase;
}

.btn{
margin-top:40px;
padding:12px 30px;
border:1px solid #111;
text-decoration:none;
color:#111;
letter-spacing:3px;
font-size:12px;
transition:all .3s;
}

.btn:hover{
background:#111;
color:white;
}

/* SHOP SECTION */

.shop{
padding:80px 20px;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
margin-top:40px;
}

.product{
width:250px;
border:1px solid #eee;
padding:20px;
}

.product img{
width:100%;
height:320px;
object-fit:cover;
background:#eee;
}

.price{
margin-top:10px;
font-weight:bold;
}

.buy{
display:inline-block;
margin-top:15px;
padding:10px 20px;
border:1px solid black;
text-decoration:none;
color:black;
font-size:12px;
letter-spacing:2px;
}

.buy:hover{
background:black;
color:white;
}

</style>
</head>

<body>

<!-- LANDING -->

<section class="hero">

<div class="logo">KADESH</div>

<div class="tagline">Set Apart</div>

<a href="#shop" class="btn">SHOP</a>

</section>


<!-- SHOP SECTION -->

<section class="shop" id="shop">

<h2>Collection</h2>

<div class="products">

<div class="product">

<a href="images/flare-front.jpg.jpg">
  <img src="images/flare-front.jpg.jpg">
</a>

<h3>L&B Flare Jeans</h3>

<div class="price">$55</div>

<a href="PAYMENT_LINK_1" class="buy">BUY</a>

</div>


<div class="product">

<a href="images/flare-back.jpg.jpg">
  <img src="images/flare-back.jpg.jpg">
</a>

<h3>L&B Distressed Denim</h3>

<div class="price">$58</div>

<a href="PAYMENT_LINK_2" class="buy">BUY</a>

</div>


<div class="product">

<img src="IMAGE_LINK_3">

<h3>Classic Western Shirt</h3>

<div class="price">$35</div>

<a href="PAYMENT_LINK_3" class="buy">BUY</a>

</div>

</div>

</section>

</body>
</html>
